<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabMagnet-Solo</title>
  <style>
    :root {
      /* Material 3 Color Tokens (Light Theme Baseline) */
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-secondary: #625B71;
      --md-sys-color-on-secondary: #FFFFFF;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-variant: #E7E0EB;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-outline-variant: #C9C4D0;
      --md-sys-color-error: #B3261E;
      --md-sys-color-on-error: #FFFFFF;
      --md-sys-color-error-container: #F9DEDC;
      --md-sys-color-on-error-container: #410E0B;
      --md-sys-color-surface-container-highest: #E6E0E9;
      --md-sys-color-surface-container-low: #F7F2FA;
      --md-sys-color-inverse-surface: #313033;
      --md-sys-color-inverse-on-surface: #F4EFF4;

      --md-sys-typescale-label-small: 500 11px/16px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --md-sys-typescale-label-medium: 500 12px/16px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --md-sys-typescale-label-large: 500 14px/20px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --md-sys-typescale-body-small: 400 12px/16px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --md-sys-typescale-body-medium: 400 14px/20px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --md-sys-typescale-title-small: 500 14px/20px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --md-sys-typescale-title-medium: 500 16px/24px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      --md-sys-typescale-headline-small: 400 24px/32px Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;

      /* Chrome/Edge Tab Group Colors */
      --tg-color-grey: #5F6368;
      --tg-color-blue: #1A73E8;
      --tg-color-red: #D93025;
      --tg-color-yellow: #E37400;
      --tg-color-green: #188038;
      --tg-color-pink: #D01884;
      --tg-color-purple: #9334E6;
      --tg-color-cyan: #007B83;
      --tg-color-orange: #E8710A;
      /* Extended Chromium Colors (including Edge) */
      --tg-color-white: #FFFFFF;
      --tg-color-black: #000000;
      --tg-color-brown: #795548;
      --tg-color-magenta: #C2185B;
      --tg-color-teal: #00897B;
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-family: Roboto, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", Helvetica, Arial, sans-serif;
      overflow: hidden;
    }

    /* Header */
    header {
      height: 64px;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .icon-button {
      width: 40px;
      height: 40px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      position: relative;
    }

    .icon-button:hover {
      background-color: rgba(0, 0, 0, 0.08);
    }

    .icon-button svg {
      fill: currentColor;
    }

    /* Tooltip */
    .tooltip {
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--md-sys-color-on-surface-variant);
      color: var(--md-sys-color-surface);
      padding: 6px 10px;
      border-radius: 4px;
      font: var(--md-sys-typescale-label-small);
      white-space: pre-wrap;
      width: max-content;
      max-width: 200px;
      display: none;
      z-index: 1000;
      pointer-events: none;
      margin-top: 4px;
      line-height: 1.4;
      text-align: left;
    }

    .icon-button:hover .tooltip,
    .tab-item:hover .tooltip,
    .switch-label:hover .tooltip,
    .radio-option:hover .tooltip,
    .color-option:hover .tooltip {
      display: block;
    }

    #settings-btn .tooltip,
    .execute-btn .tooltip {
      left: auto;
      right: 0;
      transform: none;
    }

    .switch-label .tooltip,
    .radio-option .tooltip {
      left: 0;
      transform: none;
    }

    /* List Area */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px;
    }

    .target-list-item {
      height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      cursor: pointer;
    }

    .target-list-item:last-child {
      border-bottom: none;
    }

    .target-list-item.dragging {
      opacity: 0.5;
    }

    .drag-handle {
      cursor: grab;
      color: var(--md-sys-color-on-surface-variant);
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .target-info {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      overflow: hidden;
    }

    .target-color-chip {
      width: 12px;
      height: 12px;
      border-radius: 6px;
      flex-shrink: 0;
    }

    .target-name {
      font: var(--md-sys-typescale-body-medium);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .target-actions {
      display: flex;
      gap: 4px;
    }

    /* Footer */
    footer {
      padding: 16px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
      background-color: var(--md-sys-color-surface);
    }

    .footer-button {
      flex: 1;
      height: 40px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font: var(--md-sys-typescale-label-medium);
      cursor: pointer;
      border: 1px solid var(--md-sys-color-outline);
      background: transparent;
      color: var(--md-sys-color-primary);
      padding: 0 8px;
    }

    .footer-button:hover {
      background-color: rgba(103, 80, 164, 0.08);
    }

    .footer-button svg {
      fill: currentColor;
    }

    /* Modal / Dialog */
    .scrim {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.32);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal {
      background-color: var(--md-sys-color-surface-container-highest);
      border-radius: 28px;
      width: 312px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .modal-title {
      font: var(--md-sys-typescale-headline-small);
      color: var(--md-sys-color-on-surface);
    }

    .modal-content {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .text-field {
      position: relative;
      margin-top: 8px;
    }

    .text-field input {
      height: 56px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 4px;
      padding: 0 16px;
      background-color: transparent;
      color: var(--md-sys-color-on-surface);
      font: var(--md-sys-typescale-body-medium);
      box-sizing: border-box;
      width: 100%;
      outline: none;
    }

    .text-field label {
      position: absolute;
      left: 12px;
      top: 18px;
      font: var(--md-sys-typescale-body-medium);
      color: var(--md-sys-color-on-surface-variant);
      background-color: var(--md-sys-color-surface-container-highest);
      padding: 0 4px;
      transition: all 0.2s ease;
      pointer-events: none;
    }

    .text-field input:focus {
      border: 2px solid var(--md-sys-color-primary);
      padding: 0 15px;
    }

    .text-field input:focus + label,
    .text-field input:not(:placeholder-shown) + label {
      top: -10px;
      left: 12px;
      font: var(--md-sys-typescale-label-small);
      color: var(--md-sys-color-primary);
    }

    .text-field input:not(:focus):not(:placeholder-shown) + label {
      color: var(--md-sys-color-on-surface-variant);
    }

    .color-selection {
      display: grid;
      grid-template-columns: repeat(5, 32px);
      gap: 8px;
      justify-content: center;
    }

    .color-option {
      width: 32px;
      height: 32px;
      border-radius: 16px;
      cursor: pointer;
      border: 2px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .color-option.selected {
      border-color: var(--md-sys-color-primary);
    }

    .color-option svg {
      fill: white;
      display: none;
    }

    .color-option.selected svg {
      display: block;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    .text-button {
      height: 40px;
      padding: 0 16px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font: var(--md-sys-typescale-label-large);
      cursor: pointer;
      border: 1px solid var(--md-sys-color-outline);
      background: transparent;
      color: var(--md-sys-color-primary);
    }

    .text-button:hover {
      background-color: rgba(103, 80, 164, 0.08);
    }

    .text-button.error {
      color: var(--md-sys-color-error);
      border-color: var(--md-sys-color-outline);
    }

    .text-button.error:hover {
      background-color: rgba(179, 38, 30, 0.08);
    }

    /* Tabs in Settings */
    .modal-tabs {
      display: flex;
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      margin-bottom: 8px;
    }

    .tab-item {
      flex: 1;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      position: relative;
      color: var(--md-sys-color-on-surface-variant);
    }

    .tab-item.active {
      color: var(--md-sys-color-primary);
    }

    .tab-item.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 3px;
      background-color: var(--md-sys-color-primary);
      border-radius: 3px 3px 0 0;
    }

    /* Settings Sections */
    .settings-section-title {
      font: var(--md-sys-typescale-title-small);
      color: var(--md-sys-color-primary);
      margin-bottom: 8px;
      border-bottom: 1px solid var(--md-sys-color-outline-variant);
      padding-bottom: 4px;
    }

    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .outlined-button {
      height: 40px;
      border-radius: 20px;
      border: 1px solid var(--md-sys-color-outline);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font: var(--md-sys-typescale-label-large);
      color: var(--md-sys-color-on-surface);
      cursor: pointer;
      padding: 0 12px;
    }

    .outlined-button:hover {
      background-color: rgba(0, 0, 0, 0.04);
    }

    .outlined-button svg {
      fill: currentColor;
    }

    .radio-group {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 4px;
      font: var(--md-sys-typescale-body-medium);
      cursor: pointer;
      position: relative;
    }

    /* About Tab Content */
    .about-stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font: var(--md-sys-typescale-label-small);
      color: var(--md-sys-color-on-surface-variant);
    }

    .stat-value {
      font: var(--md-sys-typescale-title-medium);
      color: var(--md-sys-color-on-surface);
    }

    .about-text {
      font: var(--md-sys-typescale-body-small);
      color: var(--md-sys-color-on-surface);
      line-height: 1.5;
    }

    .about-footer {
      font: var(--md-sys-typescale-body-small);
      color: var(--md-sys-color-on-surface-variant);
      font-style: italic;
      margin-top: 8px;
    }

    /* Pattern List */
    .pattern-list-label {
      font: var(--md-sys-typescale-label-medium);
      color: var(--md-sys-color-on-surface-variant);
      margin-top: 8px;
    }

    .pattern-list-container {
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: 194px;
      overflow-y: auto;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 8px;
      padding: 8px;
      box-sizing: border-box;
    }

    .pattern-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background-color: var(--md-sys-color-surface-container-low);
      border-radius: 8px;
      padding: 4px 8px;
      height: 44px;
      box-sizing: border-box;
    }

    .pattern-item input {
      flex: 1;
      height: 32px;
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: 4px;
      padding: 0 8px;
      background-color: transparent;
      color: var(--md-sys-color-on-surface);
      font: var(--md-sys-typescale-body-medium);
      outline: none;
    }

    .pattern-item input:focus {
      border-color: var(--md-sys-color-primary);
    }

    /* Dialog */
    .dialog {
      background-color: var(--md-sys-color-surface-container-highest);
      border-radius: 28px;
      width: 280px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .dialog-title {
      font: var(--md-sys-typescale-headline-small);
      color: var(--md-sys-color-on-surface);
    }

    .dialog-text {
      font: var(--md-sys-typescale-body-medium);
      color: var(--md-sys-color-on-surface-variant);
    }

    .hidden {
      display: none !important;
    }

    .modal-feedback {
      font: var(--md-sys-typescale-body-medium);
      color: var(--md-sys-color-error);
      font-weight: bold;
      margin-bottom: 8px;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--md-sys-color-inverse-surface);
      color: var(--md-sys-color-inverse-on-surface);
      padding: 12px 16px;
      border-radius: 4px;
      font: var(--md-sys-typescale-body-medium);
      z-index: 3000;
      box-shadow: 0 3px 5px -1px rgba(0,0,0,0.2), 0 6px 10px 0 rgba(0,0,0,0.14), 0 1px 18px 0 rgba(0,0,0,0.12);
      transition: opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
    }

    .footer-button.disabled {
      opacity: 0.38;
      cursor: default;
    }

    /* Color classes */
    .bg-grey { background-color: var(--tg-color-grey); }
    .bg-blue { background-color: var(--tg-color-blue); }
    .bg-red { background-color: var(--tg-color-red); }
    .bg-yellow { background-color: var(--tg-color-yellow); }
    .bg-green { background-color: var(--tg-color-green); }
    .bg-pink { background-color: var(--tg-color-pink); }
    .bg-purple { background-color: var(--tg-color-purple); }
    .bg-cyan { background-color: var(--tg-color-cyan); }
    .bg-orange { background-color: var(--tg-color-orange); }
    .bg-white {
      background-color: var(--tg-color-white);
      border: 2px solid var(--md-sys-color-outline-variant);
    }
    .bg-black { background-color: var(--tg-color-black); }
    .bg-brown { background-color: var(--tg-color-brown); }
    .bg-magenta { background-color: var(--tg-color-magenta); }
    .bg-teal { background-color: var(--tg-color-teal); }

    /* Material 3 Switch */
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
    }

    .switch-container.indent {
      padding-left: 24px;
    }

    .switch-container.disabled {
      opacity: 0.38;
      pointer-events: none;
    }

    .switch-label {
      font: var(--md-sys-typescale-body-medium);
      color: var(--md-sys-color-on-surface);
      position: relative;
      cursor: help;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 52px;
      height: 32px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--md-sys-color-surface-container-highest);
      border: 2px solid var(--md-sys-color-outline);
      transition: .4s;
      border-radius: 16px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 6px;
      bottom: 6px;
      background-color: var(--md-sys-color-outline);
      transition: .4s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: var(--md-sys-color-primary);
      border-color: var(--md-sys-color-primary);
    }

    input:checked + .slider:before {
      transform: translateX(20px);
      background-color: var(--md-sys-color-on-primary);
      height: 24px;
      width: 24px;
      left: 4px;
      bottom: 2px;
    }

  </style>
</head>
<body>
  <header>
    <button id="settings-btn" class="icon-button">
      <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"/></svg>
      <span class="tooltip" data-i18n="settings"></span>
    </button>
  </header>

  <main id="target-list">
    <!-- List items will be injected here -->
  </main>

  <footer>
    <button id="add-new-btn" class="footer-button">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
      <span data-i18n="addNew"></span>
    </button>
    <button id="add-from-domain-btn" class="footer-button">
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
      <span data-i18n="addFromDomain"></span>
    </button>
  </footer>

  <!-- Target Modal (Add/Edit) -->
  <div id="target-modal-scrim" class="scrim">
    <div class="modal">
      <div id="modal-title" class="modal-title">新規作成</div>
      <div class="modal-content">
        <div class="text-field">
          <input type="text" id="new-name" placeholder=" " required>
          <label data-i18n="placeholderGroupName"></label>
        </div>
        <div id="color-selection" class="color-selection">
          <!-- カラーオプションはJavaScriptで動的に生成されます -->
        </div>
        <div class="pattern-list-label" data-i18n="labelUrlPattern"></div>
        <div id="pattern-list-container" class="pattern-list-container">
          <!-- Pattern items will be injected here -->
        </div>
        <button id="add-pattern-btn" class="text-button" style="justify-content: flex-start; padding: 0 8px; border: none;">
          <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" style="fill: currentColor;"><path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/></svg>
          <span data-i18n="addPattern"></span>
        </button>
      </div>
      <div id="modal-feedback" class="modal-feedback hidden"></div>
      <div class="modal-actions">
        <button id="delete-target-btn" class="text-button error hidden" data-i18n="delete"></button>
        <div style="flex: 1;"></div>
        <button id="cancel-target-btn" class="text-button" data-i18n="cancel"></button>
        <button id="save-target-btn" class="text-button" data-i18n="save" style="background-color: var(--md-sys-color-primary-container); color: var(--md-sys-color-on-primary-container);"></button>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal-scrim" class="scrim">
    <div class="modal" style="width: 320px; padding: 16px 24px 24px 24px;">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
        <div class="modal-title" data-i18n="settings"></div>
        <button id="close-settings-btn" class="icon-button">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24"><path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"/></svg>
        </button>
      </div>

      <div class="modal-tabs">
        <div class="tab-item active" data-tab="general">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor" aria-hidden="true" role="img"><path d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-2 13.5l103 78-110 190-118-50q-11 8-23 15t-24 12L590-80H370Zm70-80h79l14-106q31-8 57.5-23.5T639-327l99 41 39-68-86-65q5-14 7-29.5t2-31.5q0-16-2-31.5t-7-29.5l86-65-39-68-99 42q-22-23-48.5-38.5T533-694l-13-106h-79l-14 106q-31 8-57.5 23.5T321-633l-99-41-39 68 86 64q-5 15-7 30t-2 32q0 16 2 31t7 30l-86 65 39 68 99-42q22 23 48.5 38.5T427-266l13 106Zm42-180q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm-2-140Z"/></svg>
          <span class="tooltip" data-i18n="tabGeneral"></span>
        </div>
        <div class="tab-item" data-tab="about">
          <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor"><path d="M440-280h80v-240h-80v240Zm40-320q17 0 28.5-11.5T520-640q0-17-11.5-28.5T480-680q-17 0-28.5 11.5T440-640q0 17 11.5 28.5T480-600Zm0 520q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>
          <span class="tooltip" data-i18n="tabAbout"></span>
        </div>
      </div>

      <div id="settings-content">
        <!-- General Tab Content -->
        <div id="tab-content-general" class="tab-pane">
          <div class="settings-section-title" data-i18n="sectionCommon"></div>
          <div class="switch-container">
            <span class="switch-label">
              <span data-i18n="settingCollectFromAllGroups"></span>
              <span class="tooltip" data-i18n="tooltipCollectFromAllGroups"></span>
            </span>
            <label class="switch">
              <input type="checkbox" id="collect-all-groups-switch">
              <span class="slider"></span>
            </label>
          </div>
          <div class="switch-container">
            <span class="switch-label">
              <span data-i18n="settingKeepTMOrder"></span>
              <span class="tooltip" data-i18n="tooltipKeepTMOrder"></span>
            </span>
            <label class="switch">
              <input type="checkbox" id="keep-tm-order-switch">
              <span class="slider"></span>
            </label>
          </div>
          <div class="switch-container">
            <span class="switch-label">
              <span data-i18n="settingCollapseAfterCollect"></span>
              <span class="tooltip" data-i18n="tooltipCollapseAfterCollect"></span>
            </span>
            <label class="switch">
              <input type="checkbox" id="collapse-after-collect-switch">
              <span class="slider"></span>
            </label>
          </div>
          <div id="discard-tabs-container" class="switch-container indent">
            <span class="switch-label">
              <span data-i18n="settingDiscardTabsAfterCollect"></span>
              <span class="tooltip" data-i18n="tooltipDiscardTabsAfterCollect"></span>
            </span>
            <label class="switch">
              <input type="checkbox" id="discard-tabs-switch">
              <span class="slider"></span>
            </label>
          </div>
          <div class="switch-container">
            <span class="switch-label">
              <span data-i18n="settingCloseDuplicateTabs"></span>
              <span class="tooltip" data-i18n="tooltipCloseDuplicateTabs"></span>
            </span>
            <label class="switch">
              <input type="checkbox" id="close-duplicate-tabs-switch">
              <span class="slider"></span>
            </label>
          </div>

          <div class="settings-section-title" data-i18n="sectionSettingsData" style="margin-top: 16px;"></div>
          <div class="settings-grid">
            <button id="copy-export-btn" class="outlined-button">
              <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"><path d="M360-240q-33 0-56.5-23.5T280-320v-480q0-33 23.5-56.5T360-880h360q33 0 56.5 23.5T800-800v480q0 33-23.5 56.5T720-240H360Zm0-80h360v-480H360v480ZM200-80q-33 0-56.5-23.5T120-160v-560h80v560h440v80H200Zm160-240v-480 480Z"/></svg>
              <span data-i18n="copyExport"></span>
            </button>
            <button id="paste-import-btn" class="outlined-button">
              <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h167q11-35 43-57.5t70-22.5q38 0 70 22.5t43 57.5h167q33 0 56.5 23.5T840-760v560q0 33-23.5 56.5T760-120H200Zm0-80h560v-560H200v560Zm280-590q13 0 21.5-8.5T510-820q0-13-8.5-21.5T480-850q-13 0-21.5 8.5T450-820q0 13 8.5 21.5T480-790ZM200-200v-560 560Z"/></svg>
              <span data-i18n="pasteImport"></span>
            </button>
            <button id="file-export-btn" class="outlined-button">
              <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"><path d="M480-320 280-520l56-58 104 104v-326h80v326l104-104 56 58-200 200ZM240-160q-33 0-56.5-23.5T160-240v-120h80v120h480v-120h80v120q0 33-23.5 56.5T720-160H240Z"/></svg>
              <span data-i18n="fileExport"></span>
            </button>
            <button id="file-import-btn" class="outlined-button">
              <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20"><path d="M440-200v-326L336-422l-56-58 200-200 200 200-56 58-104-104v326h-80ZM160-600v-120q0-33 23.5-56.5T240-800h480q33 0 56.5 23.5T800-720v120h-80v-120H240v120h-80Z"/></svg>
              <span data-i18n="fileImport"></span>
            </button>
          </div>
          <div style="margin-top: 16px;">
            <div style="font: var(--md-sys-typescale-label-medium); color: var(--md-sys-color-on-surface-variant);" data-i18n="importSettings"></div>
            <div class="radio-group">
              <label class="radio-option">
                <input type="radio" name="import-mode" value="append" checked>
                <span data-i18n="append"></span>
                <span class="tooltip" data-i18n="tooltipImportMode"></span>
              </label>
              <label class="radio-option">
                <input type="radio" name="import-mode" value="overwrite">
                <span data-i18n="overwrite"></span>
                <span class="tooltip" data-i18n="tooltipImportMode"></span>
              </label>
            </div>
          </div>
        </div>

        <!-- About Tab Content -->
        <div id="tab-content-about" class="tab-pane hidden">
          <div class="stat-item" style="margin-bottom: 8px;">
            <div class="stat-label" data-i18n="version"></div>
            <div id="about-version" class="stat-value"></div>
          </div>
          <div class="about-stats">
            <div class="stat-item">
              <div class="stat-label" data-i18n="targetCount"></div>
              <div id="about-target-count" class="stat-value">0</div>
            </div>
          </div>
          <div class="stat-item" style="margin-bottom: 12px;">
            <div class="stat-label" data-i18n="developer"></div>
            <div id="about-developer" class="stat-value"></div>
          </div>
          <div class="about-text" data-i18n="aboutDescription"></div>
          <div class="about-text" style="margin-top: 12px;" data-i18n="materialDesignCredit"></div>
          <div class="about-footer" data-i18n="disclaimer"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Dialog -->
  <div id="delete-dialog-scrim" class="scrim">
    <div class="dialog">
      <div class="dialog-title" data-i18n="confirmDeleteTitle"></div>
      <div class="dialog-text" data-i18n="confirmDelete"></div>
      <div class="modal-actions">
        <button id="confirm-delete-cancel-btn" class="text-button" data-i18n="cancel"></button>
        <button id="confirm-delete-ok-btn" class="text-button error" data-i18n="delete"></button>
      </div>
    </div>
  </div>

  <input type="file" id="file-input" class="hidden" accept=".json">
  <div id="toast" class="toast"></div>

  <template id="color-option-template">
    <div class="color-option">
      <span class="tooltip"></span>
      <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20">
        <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/>
      </svg>
    </div>
  </template>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
