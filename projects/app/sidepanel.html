<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabMagnet-Solo</title>
  <style>
    :root {
      /* Material 3 Color Tokens (Light Theme Baseline) */
      --md-sys-color-primary: #6750A4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #EADDFF;
      --md-sys-color-on-primary-container: #21005D;
      --md-sys-color-secondary: #625B71;
      --md-sys-color-on-secondary: #FFFFFF;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-variant: #E7E0EB;
      --md-sys-color-on-surface-variant: #49454F;
      --md-sys-color-outline: #79747E;
      --md-sys-color-error: #B3261E;

      --md-sys-typescale-label-large: 500 14px/20px Roboto, sans-serif;
      --md-sys-typescale-body-medium: 400 14px/20px Roboto, sans-serif;
      --md-sys-typescale-title-medium: 500 16px/24px Roboto, sans-serif;
    }

    body {
      margin: 0;
      padding: 16px;
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      font-family: Roboto, sans-serif;
    }

    h1 {
      font: var(--md-sys-typescale-title-medium);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card {
      background-color: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .section-title {
      font: var(--md-sys-typescale-label-large);
      color: var(--md-sys-color-primary);
      margin-bottom: 12px;
    }

    .target-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px;
      border-bottom: 1px solid var(--md-sys-color-surface-variant);
    }

    .target-item:last-child {
      border-bottom: none;
    }

    .target-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .target-name {
      font: var(--md-sys-typescale-label-large);
    }

    .target-pattern {
      font: var(--md-sys-typescale-body-medium);
      color: var(--md-sys-color-on-surface-variant);
      word-break: break-all;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 20px;
      padding: 8px 16px;
      font: var(--md-sys-typescale-label-large);
      cursor: pointer;
      transition: background-color 0.2s;
    }

    .btn-primary {
      background-color: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .btn-primary:hover {
      background-color: #5a4591;
    }

    .btn-tonal {
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }

    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--md-sys-color-outline);
      color: var(--md-sys-color-primary);
    }

    .btn-text {
      background-color: transparent;
      color: var(--md-sys-color-primary);
      padding: 8px;
    }

    .btn-error {
      color: var(--md-sys-color-error);
    }

    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--md-sys-color-outline);
      border-radius: 4px;
      box-sizing: border-box;
      margin-bottom: 8px;
      background-color: transparent;
      color: var(--md-sys-color-on-surface);
    }

    .fab {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
      font-size: 24px;
    }

    .import-export {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    #add-form {
      display: none;
      margin-top: 16px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="section-title" data-i18n="addCurrentTabTitle"></div>
    <button id="add-current-tab" class="btn-tonal" style="width: 100%;" data-i18n="addThisDomain"></button>
  </div>

  <div class="card">
    <div class="section-title" data-i18n="targetListTitle"></div>
    <div id="target-list">
      <!-- ターゲットがここに表示される -->
    </div>
    <button id="show-add-form" class="btn-text" data-i18n="addNew"></button>

    <div id="add-form">
      <input type="text" id="new-name" data-i18n-placeholder="placeholderGroupName">
      <input type="text" id="new-pattern" data-i18n-placeholder="placeholderUrlPattern">
      <div class="actions">
        <button id="save-target" class="btn-primary" data-i18n="save"></button>
        <button id="cancel-add" class="btn-outline" data-i18n="cancel"></button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title" data-i18n="settingsTitle"></div>
    <div class="section-subtitle" style="font: var(--md-sys-typescale-body-medium); margin-bottom: 8px;" data-i18n="protectedGroupsLabel"></div>
    <input type="text" id="protected-groups" data-i18n-placeholder="placeholderProtectedGroups">
    <button id="save-settings" class="btn-tonal" style="width: 100%; margin-top: 8px;" data-i18n="saveSettings"></button>

    <div class="import-export">
      <button id="export-btn" class="btn-outline" style="flex: 1;" data-i18n="export"></button>
      <button id="import-btn" class="btn-outline" style="flex: 1;" data-i18n="import"></button>
    </div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
