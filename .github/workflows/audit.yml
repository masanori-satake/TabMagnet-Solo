name: "監査: 透明性とセキュリティ (Audit: Transparency and Security)"

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'projects/**'
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integrity-and-oss:
    name: コード整合性とOSS監査 (Code Integrity and OSS Audit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pre-commit
      run: pip install pre-commit

    - name: 0. Pre-commit Lint
      run: npm run pre-commit

    - name: 1. ルートディレクトリのクリーンネス確認 (Root Directory Cleanliness)
      run: python scripts/check_root_files.py

    - name: 2. プロジェクトポリシー確認 (Project Policy Guard)
      run: python scripts/verify_project_policies.py

    - name: 3. バージョンの一貫性確認 (Version Consistency)
      run: python scripts/check_version.py

    - name: 4. 外部OSS依存関係なしの確認 (No Production Dependencies)
      run: python scripts/audit_production_dependencies.py
